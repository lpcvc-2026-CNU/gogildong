# =============================================================================
# LPCVC 2026 Track 1 - Central Configuration
# =============================================================================
# 모든 하이퍼파라미터, 경로, 학습 설정을 이 파일 하나에서 관리합니다.
# config.py (dataclass) 를 완전히 대체합니다.

# -----------------------------------------------------------------------------
# 모델 구조
# -----------------------------------------------------------------------------
model:
  # 학생 이미지 인코더 (timm)
  student_image_backbone: "mobilenetv4_conv_medium.e500_r224_in1k"
  student_image_input_size: 224 # 대회 고정 규격 (변경 금지)
  student_image_output_dim: 960 # MobileNetV4-Small GAP 출력 차원

  # 학생 텍스트 인코더
  student_text_backbone: "distilbert-base-uncased"
  student_text_output_dim: 768 # DistilBERT hidden dim

  # 공유 임베딩 차원 (두 인코더의 공통 출력 공간)
  embed_dim: 512

  # Head_Sig: SigLIP2 공간 투영 헤드
  siglip_teacher_dim: 1152 # SigLIP2-SO400M 임베딩 차원
  proj_sig_hidden_dim: 1024

  # Head_DFN: DFN 공간 투영 헤드
  dfn_teacher_dim: 1024 # DFN ViT-H-14 임베딩 차원
  proj_dfn_hidden_dim: 1024

  # 스승 모델 식별자 (학습 시에만 사용, 추론/제출 시 불필요)
  siglip2_model_name: "google/siglip2-so400m-patch16-naflex"
  siglip2_input_size: 384
  dfn_model_name: "apple/DFN5B-CLIP-ViT-H-14-378"
  dfn_input_size: 378

  # 텍스트 토크나이저 (대회 규격 고정 - 변경 금지)
  tokenizer_name: "openai/clip-vit-base-patch32"
  max_text_length: 77

# -----------------------------------------------------------------------------
# 학습 일반 설정
# -----------------------------------------------------------------------------
training:
  batch_size: 256
  num_workers: 8
  seed: 42
  output_dir: "checkpoints"
  log_dir: "logs"

  # 대조 학습 온도 (learnable_temperature=True 이면 초기값으로만 사용)
  temperature: 0.07
  learnable_temperature: true

  # KL 증류 소프트 레이블 온도 (클수록 부드러운 분포)
  kl_temperature: 4.0

  # 그래디언트 클리핑
  max_grad_norm: 1.0

  # -------------------------------------------------------------------
  # Stage 1: DFN Warm-up (이미지 인코더 사전학습)
  # -------------------------------------------------------------------
  stage1:
    epochs: 10
    lr: 1.0e-4
    weight_decay: 1.0e-4
    warmup_steps: 500
    freeze_text: true # DistilBERT 동결
    lambda1: 0.2 # L_CLIP 가중치
    lambda2: 0.8 # L_MSE(DFN) 가중치
    lambda3: 0.0 # L_KL 비활성

  # -------------------------------------------------------------------
  # Stage 2: Dual Teacher KD (관계 증류 메인 학습)
  # -------------------------------------------------------------------
  stage2:
    epochs: 30
    lr: 5.0e-5
    weight_decay: 1.0e-4
    warmup_steps: 1000
    freeze_text: false # DistilBERT 해제
    lambda1: 0.3 # L_CLIP (고정)
    # λ2, λ3 는 에폭에 따라 선형 보간 (Dynamic Weighting)
    lambda2_start: 0.5 # 초반: DFN MSE 높게
    lambda2_end: 0.1 # 후반: DFN MSE 낮게
    lambda3_start: 0.2 # 초반: KL 낮게
    lambda3_end: 0.6 # 후반: KL 높게

  # -------------------------------------------------------------------
  # Stage 3: QAT Fine-tuning (양자화 보정)
  # -------------------------------------------------------------------
  stage3:
    epochs: 5
    lr: 1.0e-5
    weight_decay: 1.0e-4
    warmup_steps: 200
    freeze_text: false
    lambda1: 0.7 # L_CLIP 비중 상향
    lambda2: 0.1
    lambda3: 0.2

# -----------------------------------------------------------------------------
# 데이터 설정
# -----------------------------------------------------------------------------
data:
  train_path: "data/train"
  val_path: "data/val"
  # 스승 모델이 볼 이미지 해상도 (SigLIP2 용)
  teacher_image_size: 384
  # ImageNet 정규화 (학생 모델용)
  image_mean: [0.485, 0.456, 0.406]
  image_std: [0.229, 0.224, 0.225]
  # SigLIP2 / DFN 정규화 (스승 모델용)
  teacher_mean: [0.5, 0.5, 0.5]
  teacher_std: [0.5, 0.5, 0.5]
  # 데이터 증강 강도
  augmentation:
    random_crop_scale_min: 0.8
    random_crop_scale_max: 1.0
    color_jitter_brightness: 0.1
    color_jitter_contrast: 0.1
    color_jitter_saturation: 0.1
    color_jitter_hue: 0.05

# -----------------------------------------------------------------------------
# ONNX 내보내기 및 Qualcomm AI Hub 제출 설정
# -----------------------------------------------------------------------------
export:
  output_dir: "export"
  onnx_opset: 17
  # Qualcomm AI Hub 설정
  qai_hub:
    device: "Snapdragon 8 Elite QRD" # 대회 평가 타겟 디바이스
    target_runtime: "onnx" # ONNX Runtime (QNN EP)
    compile_options: "" # 추가 컴파일 옵션 (필요시)
    quantize_weights: "int8" # 가중치 양자화 타입 (int8 / fp16 / "")
    quantize_activations: "int8" # 활성화 양자화 타입
    calibration_samples: 512 # 양자화 보정 샘플 수
  # 모델 이름 (AI Hub 제출 시 표시)
  image_model_name: "LPCVC26_T1_ImageEncoder"
  text_model_name: "LPCVC26_T1_TextEncoder"
