# MobileCLIP2-S4 — LPCV 2026 Image-Text Retrieval (dual-teacher distillation)
# Dataset: https://lpcv.ai/2026LPCVC/image-text-retrieval/
# Expected layout: DATASET.md in project root

data:
  dataset_type: coco                   # "json" | "coco" | "csv" — 실제 구조: dataset/coco/
  image_root: dataset/coco/train2017
  coco_annotations: dataset/coco/annotations/captions_train2017.json
  filter_missing: true                 # true: 이미지 존재하는 쌍만 사용 (캡션/이미지 수 불일치 대응)
  # json: image_root: dataset/images, captions_json: dataset/captions.json
  # csv_path: dataset/data2/dataset_zip/lpcvc_300k_master_fixed.csv  # dataset_type: csv, image_root: dataset/data2/dataset_zip
  val_split: 0.05

model:
  student_name: MobileCLIP2-S4         # open_clip MobileCLIP2-S4 (~50M params)
  teacher_names: [ViT-SO400M-14-SigLIP2, ViT-L-14]  # two teachers for dual distillation
  pretrained_tags:
  - "webli"
  - "dfn2b"
  embed_dim: 512
  temperature: 0.04                   # often lower for smaller models

training:
  batch_size: 4                      # per-step batch (VRAM 제한 시 축소)
  accumulation_steps: 32             # gradient accumulation → effective batch = 4 * 32 = 128
  epochs: 12
  lr: 5.0e-4
  weight_decay: 0.2
  warmup: 1000
  use_teacher: true
  distill_weights: [0.4, 0.4]         # one weight per teacher (must match teacher_names length)
  clip_grad_norm: 1.0
  amp: true
  ema_decay: 0.9995

paths:
  save_dir: runs/mobileclip2_s4
  onnx_dir: exported_onnx
