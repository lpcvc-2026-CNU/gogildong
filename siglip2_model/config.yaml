# Configuration for SigLIP 2 Base fine‑tuning

data:
  image_root: ./data/images            # path to directory containing training images
  captions_json: ./data/captions.json  # JSON file with [{"image": "img.jpg", "caption": "..."}, ...]
  val_split: 0.05                      # fraction of data reserved for validation

model:
  student_name: siglip2_base           # open‑clip model identifier for the student
  teacher_name: siglip2_so400m         # set to null to disable distillation
  embed_dim: 512                       # embedding dimension (SigLIP base uses 512)
  temperature: 0.07                    # temperature parameter for contrastive loss

training:
  batch_size: 128
  epochs: 10
  lr: 5.0e-4
  weight_decay: 0.2
  warmup: 1000                         # number of warmup steps
  use_teacher: true                    # enable knowledge distillation
  distill_weight: 0.5                  # weight of the distillation loss
  clip_grad_norm: 1.0                  # gradient clipping threshold
  amp: true                            # use automatic mixed precision
  ema_decay: 0.9995                    # exponential moving average decay for student weights

paths:
  save_dir: runs/siglip2               # where to save checkpoints and logs
  onnx_dir: exported_onnx              # directory for ONNX exports
